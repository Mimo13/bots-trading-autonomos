<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dashboard Bots</title>
  <style>
    :root{
      --bg:#0b0f18; --panel:#111827; --panel2:#151d2e; --panel3:#1b2438;
      --line:#263044; --muted:#8791a5; --text:#edf2fb; --soft:#c7d0df;
      --green:#67c839; --red:#ef4444; --orange:#f59e0b; --amber:#f59e0b; --yellow:#eab308;
      --purple:#6d5dfc; --violet:#8b5cf6; --blue:#3b82f6; --cyan:#06b6d4;
      --good-grad:linear-gradient(135deg,#61bd2f,#4aa51f); --bad-grad:linear-gradient(135deg,#d83d42,#b72931);
      --warn-grad:linear-gradient(135deg,#f59e0b,#d97706); --neutral-grad:linear-gradient(135deg,#eab308,#d0a006);
      --shadow:0 14px 40px rgba(0,0,0,.35); --r:12px; --r2:8px;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 30% -10%,rgba(109,93,252,.16),transparent 28%),var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    button{font:inherit} .app{display:grid;grid-template-columns:54px 1fr;min-height:100vh}.side{background:#0f1523;border-right:1px solid #202a3d;padding:14px 8px;display:flex;flex-direction:column;gap:10px;position:sticky;top:0;height:100vh}.side-btns{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0}.side button{width:36px;height:36px;border:1px solid transparent;background:transparent;color:#aeb8cb;border-radius:9px;cursor:pointer;flex-shrink:0}.side button.active,.side button:hover{background:#283159;color:#fff;border-color:#3c4780}.main{min-width:0;padding:14px}.side-version{font-size:9px;color:#4a5470;text-align:center;padding:4px 0 2px}.top{height:54px;background:rgba(17,24,39,.88);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:var(--r);display:flex;align-items:center;gap:14px;padding:0 16px;margin-bottom:12px;box-shadow:var(--shadow)}.brand{font-weight:800}.date{font-size:12px;color:var(--muted)}.tabs{display:flex;gap:6px;overflow:auto;flex:1}.tab{border:1px solid #263044;background:#111827;color:#c7d0df;padding:8px 14px;border-radius:7px;cursor:pointer;white-space:nowrap;font-size:12px}.tab.active{background:#4f46e5;border-color:#6d5dfc;color:#fff}.actions{display:flex;gap:8px}.action-stack{display:grid;gap:8px}.action-stack .btn{width:100%;text-align:left;justify-content:flex-start}.tokens-list{display:flex;gap:7px;flex-wrap:wrap}.token-pill{border:1px solid #31405d;background:#182136;color:#d7deec;border-radius:999px;padding:5px 9px;font-size:11px}.token-pill.empty{color:#8791a5;border-style:dashed}.btn{border:1px solid #34405a;background:#172038;color:#e7ecf5;padding:8px 12px;border-radius:7px;cursor:pointer;font-size:12px}.btn.primary{background:#4f46e5;border-color:#6157f0}.btn.red{background:#dc2626;border-color:#ef4444}.btn:hover{filter:brightness(1.1)}
    .grid{display:grid;gap:12px}.home-layout{grid-template-columns:repeat(3,minmax(0,1fr))}.status-card,.card{background:rgba(17,24,39,.92);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.status-card{padding:16px;min-height:118px}.card{padding:14px;min-width:0}.card-title{font-size:12px;font-weight:700;color:#d7deec;margin:0 0 10px;display:flex;justify-content:space-between;align-items:center}.sub{font-size:11px;color:var(--muted)}.dot{width:8px;height:8px;border-radius:99px;display:inline-block}.dot.on{background:var(--green);box-shadow:0 0 10px rgba(103,200,57,.7)}.dot.off{background:#6b7280}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1px solid #31405d;padding:4px 9px;font-size:11px;color:#d7deec;background:#182136}.pill.good{color:#b9f7c1;border-color:rgba(103,200,57,.4);background:rgba(103,200,57,.12)}.pill.bad{color:#fecaca;border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.12)}.pill.warn{color:#fde68a;border-color:rgba(245,158,11,.45);background:rgba(245,158,11,.12)}.pill.neutral{color:#ddd6fe;border-color:rgba(139,92,246,.45);background:rgba(139,92,246,.12)}.pill.ai{background:rgba(139,92,246,.18);border-color:#6d5dfc;color:#c4b5fd;font-size:10px}.latencies{display:flex;gap:8px;flex-wrap:wrap}.alert-chip{padding:5px 9px;border-radius:999px;font-size:11px;border:1px solid;background:#1b2334}.alert-chip.ok{border-color:rgba(103,200,57,.4);color:#b9f7c1}.alert-chip.warning{border-color:rgba(245,158,11,.45);color:#fde68a}.alert-chip.critical{border-color:rgba(239,68,68,.45);color:#fecaca}
    .metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:12px 0}.metric{position:relative;overflow:hidden;border-radius:10px;padding:17px 18px;min-height:96px;border:1px solid rgba(255,255,255,.08);box-shadow:0 12px 28px rgba(0,0,0,.25)}.metric.good{background:var(--good-grad)}.metric.bad{background:var(--bad-grad)}.metric.warn{background:var(--warn-grad)}.metric.neutral{background:var(--neutral-grad)}.metric.blue{background:linear-gradient(135deg,#3b82f6,#4f46e5)}.metric .label{font-size:13px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.2)}.metric .value{font-size:31px;font-weight:900;letter-spacing:-.7px;margin-top:6px}.metric .foot{font-size:11px;opacity:.82}.spark{position:absolute;right:12px;bottom:10px;width:98px;height:42px;opacity:.35}.section{margin-top:12px}.bot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.bot-card{cursor:pointer;transition:.15s}.bot-card:hover{transform:translateY(-2px);border-color:#6d5dfc}.bot-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.bot-name{font-weight:800}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.kpi .v{font-size:19px;font-weight:900}.kpi .l{font-size:10px;color:var(--muted);text-transform:uppercase}.pos{color:#86efac}.neg{color:#fca5a5}.flat{color:#cbd5e1}.layout-b{display:grid;grid-template-columns:1.15fr 1.15fr 1.15fr 1.15fr;gap:12px}.span2{grid-column:span 2}.span4{grid-column:span 4}.chart{width:100%;height:176px}.chart.small{height:146px}.bars{display:flex;align-items:end;gap:10px;height:150px;padding-top:10px}.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}.bar{width:70%;border-radius:6px 6px 2px 2px;min-height:3px}.bar-label{font-size:10px;color:var(--muted);max-width:70px;overflow:hidden;text-overflow:ellipsis}.bar-value{font-size:11px;font-weight:700}.donut{display:flex;align-items:center;gap:16px;justify-content:center;min-height:150px}.donut svg{width:128px;height:128px}.legend{display:grid;gap:6px;font-size:11px;color:var(--muted)}table{width:100%;border-collapse:collapse;font-size:12px}th{font-size:10px;color:#788398;text-transform:uppercase;text-align:left;border-bottom:1px solid #253044;padding:7px 8px}td{border-bottom:1px solid rgba(38,48,68,.55);padding:7px 8px;white-space:nowrap}tr:hover td{background:rgba(255,255,255,.025)}.num{text-align:right;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.table-wrap{overflow:auto}.empty{color:#6f7a8f;text-align:center;padding:34px 8px}.loader{padding:30px;color:var(--muted)}.decision{max-width:420px;overflow:hidden;text-overflow:ellipsis}.mobile-title{display:none}
    @media(max-width:1180px){.layout-b{grid-template-columns:1fr 1fr}.span2{grid-column:span 1}.span4{grid-column:span 2}}
    @media(max-width:700px){.app{grid-template-columns:1fr}.side{display:none}.main{padding:8px}.top{height:auto;flex-wrap:wrap;padding:10px}.tabs{order:3;width:100%}.actions{width:100%;overflow:auto}.home-layout,.layout-b{grid-template-columns:1fr}.span2,.span4{grid-column:span 1}.metric .value{font-size:25px}.mobile-title{display:block}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const {useEffect,useMemo,useState}=React;
    const API={
      bots:()=>fetch('/api/bots').then(r=>r.json()), bot:n=>fetch(`/api/bots/${n}`).then(r=>r.json()),
      alerts:()=>fetch('/api/alerts').then(r=>r.json()), latency:()=>fetch('/api/latency').then(r=>r.json()),
      weekly:()=>fetch('/api/weekly-compare').then(r=>r.json()), reasons:n=>fetch(`/api/reasons/${n}?days=1`).then(r=>r.json()),
      equity:n=>fetch(`/api/equity/${n}?days=7`).then(r=>r.json()),
      pnlHourly:n=>fetch(`/api/pnl-hourly/${n}?hours=24`).then(r=>r.json()),       binancePortfolio:()=>fetch('/api/binance/personal-portfolio').then(r=>r.json()), personalPortfolio:()=>fetch('/api/personal-portfolio').then(r=>r.json()), start:n=>fetch(`/api/bots/${n}/start`,{method:'POST'}).then(r=>r.json()), stop:n=>fetch(`/api/bots/${n}/stop`,{method:'POST'}).then(r=>r.json())
    };
    const money=n=>Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
    const moneyMaybe=n=>(n===null||n===undefined||n==='')?'—':Number(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
    const pct=n=>(Number(n||0)*100).toLocaleString('es-ES',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
    const cls=n=>Number(n||0)>0?'pos':Number(n||0)<0?'neg':'flat';
    const tone=(v,goodZero=false)=>Number(v||0)>0?'good':Number(v||0)<0?'bad':goodZero?'good':'neutral';
    const shortDate=v=>v?new Date(v).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    const botIcon=n=>n.includes('poly')||n==='pfolio'?'⬢':n.includes('fabian')||n==='sol_pb'?'◆':'●';

    function Spark({data=[],color='white'}){const vals=data.length?data.map(Number):[0,1,0,2,1,3]; const min=Math.min(...vals),max=Math.max(...vals); const pts=vals.map((v,i)=>`${i*(96/(vals.length-1||1))},${38-((v-min)/(max-min||1))*32}`).join(' '); return <svg className="spark" viewBox="0 0 100 42"><polyline points={pts} fill="none" stroke={color} strokeWidth="2"/><circle cx="94" cy="6" r="2" fill={color}/></svg>}
    function LineChart({items=[],field='cumulative_pnl',labelField='day',color='#8b5cf6'}){const vals=items.map(x=>Number(x[field]||0)); const min=Math.min(0,...vals), max=Math.max(1,...vals); const pts=vals.map((v,i)=>`${8+i*((284)/(Math.max(1,vals.length-1)))},${146-((v-min)/(max-min||1))*116}`).join(' '); const zero=146-((0-min)/(max-min||1))*116; return <svg className="chart" viewBox="0 0 300 170" preserveAspectRatio="none"><g stroke="#263044" strokeWidth="1">{[0,1,2,3].map(i=><line key={i} x1="8" x2="292" y1={30+i*36} y2={30+i*36}/>)}</g><line x1="8" x2="292" y1={zero} y2={zero} stroke="#475569" strokeDasharray="4 4"/><polyline points={pts} fill="none" stroke={color} strokeWidth="3"/><polygon points={`8,150 ${pts} 292,150`} fill={color} opacity=".15"/>{vals.map((v,i)=><circle key={i} cx={8+i*(284/(Math.max(1,vals.length-1)))} cy={146-((v-min)/(max-min||1))*116} r="3" fill={color}/>)}</svg>}
    function BarChart({items=[],value='pnl_week',label='short',percent=false}){const vals=items.map(x=>Math.abs(Number(x[value]||0))); const max=Math.max(1,...vals); return <div className="bars">{items.map((x,i)=>{const v=Number(x[value]||0); return <div className="bar-wrap" key={i}><div className={`bar-value ${cls(v)}`}>{percent?pct(v):money(v)}</div><div className="bar" style={{height:Math.max(4,Math.abs(v)/max*112),background:v>=0?'var(--green)':'var(--red)'}}></div><div className="bar-label">{x[label]||x.bot_name}</div></div>})}</div>}
    function Donut({wins=0,losses=0,flat=0}){const total=Math.max(1,wins+losses+flat), cw=2*Math.PI*45; const sw=wins/total*cw, sl=losses/total*cw, sf=flat/total*cw; return <div className="donut"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="45" fill="none" stroke="#263044" strokeWidth="18"/><circle cx="60" cy="60" r="45" fill="none" stroke="var(--green)" strokeWidth="18" strokeDasharray={`${sw} ${cw}`} transform="rotate(-90 60 60)"/><circle cx="60" cy="60" r="45" fill="none" stroke="var(--red)" strokeWidth="18" strokeDasharray={`${sl} ${cw}`} strokeDashoffset={-sw} transform="rotate(-90 60 60)"/><circle cx="60" cy="60" r="45" fill="none" stroke="var(--orange)" strokeWidth="18" strokeDasharray={`${sf} ${cw}`} strokeDashoffset={-(sw+sl)} transform="rotate(-90 60 60)"/><text x="60" y="64" textAnchor="middle" fill="#edf2fb" fontSize="18" fontWeight="800">{pct(wins/(wins+losses||1))}</text></svg><div className="legend"><span><b className="pos">●</b> WIN {wins}</span><span><b className="neg">●</b> LOSS {losses}</span><span><b style={{color:'var(--orange)'}}>●</b> Sin cerrar {flat}</span></div></div>}
    function Metric({label,value,kind='neutral',foot,spark=[]}){return <div className={`metric ${kind}`}><div className="label">{label}</div><div className="value">{value}</div>{foot&&<div className="foot">{foot}</div>}<Spark data={spark}/></div>}
    function Card({title,sub,children,cls=''}){return <section className={`card ${cls}`}><h3 className="card-title"><span>{title}</span>{sub&&<span className="sub">{sub}</span>}</h3>{children}</section>}
    function fmtCell(v){if(v==null||v==='')return '—'; if(typeof v==='object')return JSON.stringify(v); return String(v)}
    function Table({headers,rows,empty='Sin datos'}){if(!rows?.length)return <div className="empty">{empty}</div>; return <div className="table-wrap"><table><thead><tr>{headers.map(h=><th key={h.k} className={h.num?'num':''}>{h.t}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={i}>{headers.map(h=><td key={h.k} className={`${h.num?'num':''} ${h.class? h.class(r[h.k],r):''}`}>{h.f?h.f(r[h.k],r):fmtCell(r[h.k])}</td>)}</tr>)}</tbody></table></div>}
    function tokenSetFromBotData(botData=[]){const set=new Set(); botData.forEach(d=>(d.positions||[]).forEach(p=>{if(p.symbol)set.add(p.symbol)})); return [...set].sort()}
    function TokensPanel({tokens=[],sub='tokens reales en operaciones abiertas'}){return <Card title="Tokens operados" sub={sub}><div className="tokens-list">{tokens.length?tokens.map(t=><span key={t} className="token-pill">{t}</span>):<span className="token-pill empty">Sin token informado en operaciones abiertas</span>}</div></Card>}
    

    function Home({bots,setPage}){const [data,setData]=useState({botData:[],weekly:[],latency:[],alerts:[],binance:{ok:false,total_usd:0,items:[]},personal:{ok:false,accounts:[],cold_wallet:{items:[],total:0}}}); async function load(){const br=await API.bots(); const botData=await Promise.all(br.bots.map(b=>API.bot(b.name))); const [weekly,lat,alerts,binance,personal]=await Promise.all([API.weekly(),API.latency(),API.alerts(),API.binancePortfolio(),API.personalPortfolio()]); setData({botData,weekly:weekly.items||[],latency:lat.items||[],alerts:alerts.alerts||[],binance:binance||{ok:false,total_usd:0,items:[]},personal:personal||{ok:false,accounts:[],cold_wallet:{items:[],total:0}}})} useEffect(()=>{load();const t=setInterval(load,15000);return()=>clearInterval(t)},[]);
      const totals=useMemo(()=>data.botData.reduce((a,d)=>{const s=d.status,p=d.performance||{}; a.balance+=+s.balance_usd||0; a.tokens+=+s.tokens_value_usd||0; a.day+=+s.pnl_day_usd||0; a.week+=+p.pnl_7d||+s.pnl_week_usd||0; a.closed+=+p.closed_trades||0; a.wins+=+p.wins||0; a.online+=s.is_running?1:0; return a},{balance:0,tokens:0,day:0,week:0,closed:0,wins:0,online:0}),[data]);
      const tokens=useMemo(()=>tokenSetFromBotData(data.botData),[data.botData]);
      return <><div className="grid home-layout"><div className="status-card"><div className="card-title">Estado del sistema <span className={totals.online?'pill good':'pill bad'}><span className={`dot ${totals.online?'on':'off'}`}></span>{totals.online?'ON':'OFF'}</span></div><div className="sub">Paper/Real: Paper<br/>Real deshabilitado<br/>{totals.online}/{data.botData.length} bots ON</div><div style={{display:'flex',gap:8,marginTop:14}}><button className="btn primary">Start</button><button className="btn red">Stop</button></div></div><Card title="Alertas activas" sub="datos reales"><div className="latencies">{data.alerts.slice(0,8).map((a,i)=><span key={i} className={`alert-chip ${a.severity}`}>{a.name}: {a.message}</span>)}</div></Card><Card title="Latencia feeds/servicios" sub="datos reales"><div className="latencies">{data.latency.map((x,i)=><span key={i} className={`alert-chip ${x.severity}`}>{x.name}: {x.age_s==null?'ausente':x.age_s+'s'}</span>)}</div></Card></div><div className="metric-row"><Metric label="Saldo $" value={money(totals.balance)} kind={tone(totals.balance-400,true)} foot={<>{totals.online}/{data.botData.length} bots ON{totals.tokens>0?<> · <span style={{color:'var(--amber)'}}>{money(totals.tokens)} en tokens</span></>:null}</>} spark={data.botData.map(d=>d.status.balance_usd)}/><Metric label="PnL Día" value={money(totals.day)} kind={tone(totals.day)} foot="suma de bots" spark={data.botData.map(d=>d.status.pnl_day_usd)}/><Metric label="PnL Semana" value={money(totals.week)} kind={tone(totals.week)} foot="últimos 7 días" spark={data.weekly.map(x=>x.pnl_week)}/><Metric label="Acierto" value={pct(totals.wins/(totals.closed||1))} kind={totals.closed? (totals.wins/totals.closed>=.55?'good':totals.wins/totals.closed>=.4?'warn':'bad'):'neutral'} foot={`${totals.closed} operaciones cerradas`} spark={data.weekly.map(x=>x.win_rate)}/></div><div className="grid layout-b">{(()=>{const sortedPnL=[...data.weekly].sort((a,b)=>b.pnl_week-a.pnl_week); const sortedWR=[...data.weekly].sort((a,b)=>b.win_rate-a.win_rate); const sortedBots=[...data.botData].sort((a,b)=> (b.performance?.pnl_7d||0)-(a.performance?.pnl_7d||0)); return <><Card title="Comparación semanal (PnL)" cls="span2"><BarChart items={sortedPnL} /></Card><Card title="Win rate por bot" cls="span2"><BarChart items={sortedWR} value="win_rate" percent /></Card><Card title="Portfolio personal" cls="span2" sub={`Feb: ${money(data.personal?.totals?.febrero||0)}€ → Abr: ${money(data.personal?.totals?.abril||0)}€`}><Table headers={[{k:'name',t:'Cuenta'},{k:'febrero',t:'Febrero',num:true,f:v=>money(v)+'€'},{k:'abril',t:'Abril',num:true,f:v=>money(v)+'€',class:v=>v>0?'pos':'neg'}]} rows={(data.personal?.accounts||[]).filter(x=>!x.name.includes('Total')).slice(0,12)} empty='Sin datos' /></Card><Card title="Portfolio personal Binance" cls="span2" sub={data.binance?.ok ? `Total: \$${money(data.binance.total_usd)}` : 'sin acceso'}><div style={{marginBottom:8}}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{(data.binance?.items||[]).filter(x=>x.usd_value!=null).slice(0,8).map((x,i)=>{const pct = ((x.usd_value||0) / Math.max(1, data.binance.total_usd)) * 100;return <div key={i} style={{flex:Math.max(1,pct),minWidth:8,height:14,background:Number(x.change_24h||0)>=0?'var(--green)':'var(--red)',borderRadius:3,opacity:0.7+(pct/100)*0.3}} title={`${x.asset}: \$${money(x.usd_value)} (${pct.toFixed(1)}%)`}></div>;})}</div></div><Table headers={[{k:'asset',t:'Asset'},{k:'qty',t:'Cantidad',num:true,f:moneyMaybe},{k:'usd_value',t:'Valor \$',num:true,f:moneyMaybe,class:cls},{k:'change_24h',t:'24h %',num:true,f:v=>v!=null?Number(v).toFixed(1)+'%':'—',class:v=>Number(v||0)>0?'pos':Number(v||0)<0?'neg':'flat'}]} rows={(data.binance?.items||[]).filter(x=>x.usd_value!=null&&(x.usd_value>=1||x.asset==='USDT')).slice(0,10)} empty={data.binance?.error||'Sin datos'} />{(()=>{const low=(data.binance?.items||[]).filter(x=>x.usd_value!=null&&x.usd_value<1); if(!low.length)return null; const l     function FxChart({sel}){const cid=React.useMemo(()=>'tv_'+Math.random().toString(36).slice(2,8),[]);React.useEffect(()=>{if(!sel)return;const el=document.getElementById(cid);if(!el)return;el.innerHTML='';const tvSym=FX_PAIRS[sel]||sel;const init=()=>{try{new window.TradingView.widget({container_id:cid,symbol:tvSym,interval:'60',theme:'dark',style:'1',locale:'es',width:'100%',height:400,hide_top_toolbar:false,save_image:false,enable_publishing:false,allow_symbol_change:false,autosize:false,toolbar_bg:'#0b0f18',studies:[]})}catch(e){}};if(window.TradingView)setTimeout(init,50);else{const s=document.createElement('script');s.src='https://s3.tradingview.com/tv.js';s.async=true;s.onload=init;document.head.appendChild(s);return()=>{try{document.head.removeChild(s)}catch(e){}}}},[sel,cid]);return<div id={cid} style={{width:'100%',height:400,borderRadius:'8px',overflow:'hidden'}}></div>}
    function LwChart({sel,tf,positions,trades}){const ref=React.useRef(null);const[l,setL]=React.useState(true);const[e,setE]=React.useState('');const posRef=React.useRef(positions);const tradesRef=React.useRef(trades);const cid=React.useMemo(()=>'lwc_'+Math.random().toString(36).slice(2,8),[]);React.useEffect(()=>{posRef.current=positions;tradesRef.current=trades});React.useEffect(()=>{let dead=false;setL(true);setE('');const el=document.getElementById(cid);if(!el)return;el.innerHTML='';const chart={current:null};const ro=new ResizeObserver(()=>{if(chart.current)chart.current.applyOptions({width:el.clientWidth})});(async()=>{try{const bnSym=BINANCE_PAIRS[sel]||sel+'USDT';const lims={'1h':84,'4h':84,'1d':50};const res=await fetch('https://api.binance.com/api/v3/klines?symbol='+bnSym+'&interval='+tf+'&limit='+(lims[tf]||84));if(!res.ok)throw new Error('HTTP '+res.status);const klines=await res.json();if(dead)return;if(!window.LightweightCharts)await new Promise((ok,no)=>{const s=document.createElement('script');s.src='https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js';s.async=true;s.onload=ok;s.onerror=no;document.head.appendChild(s)});if(dead)return;const{createChart,CrosshairMode}=LightweightCharts;const c=createChart(el,{layout:{theme:'dark',background:'transparent',textColor:'#c7d0df'},grid:{vertLines:{color:'#1e2a45'},horzLines:{color:'#1e2a45'}},timeScale:{borderColor:'#263044',timeVisible:true},rightPriceScale:{borderColor:'#263044'},crosshair:{mode:CrosshairMode.Normal},width:el.clientWidth,height:400});chart.current=c;const cs=c.addCandlestickSeries({upColor:'#67c839',downColor:'#ef4444',borderDownColor:'#ef4444',borderUpColor:'#67c839',wickDownColor:'#ef4444',wickUpColor:'#67c839'});const cd=klines.map(k=>({time:Math.floor(k[0]/1000),open:parseFloat(k[1]),high:parseFloat(k[2]),low:parseFloat(k[3]),close:parseFloat(k[4])}));cs.setData(cd);c.timeScale().applyOptions({barSpacing:12});try{const atrPd=14;const trs=[];for(let i=1;i<cd.length;i++)trs.push(Math.max(cd[i].high-cd[i].low,Math.abs(cd[i].high-cd[i-1].close),Math.abs(cd[i].low-cd[i-1].close)));const atrs=[];for(let i=atrPd-1;i<trs.length;i++){let s=0;for(let j=0;j<atrPd;j++)s+=trs[i-j];atrs.push({time:cd[i+1].time,val:s/atrPd})}const lastAtr=atrs.length?atrs[atrs.length-1].val:0;const lastC=cd[cd.length-1];if(lastAtr>0){const upB=c.addLineSeries({color:'#f59e0b',lineWidth:1,lineStyle:2,title:'ATR+',lastValueVisible:true,priceLineVisible:false});upB.setData(cd.slice(atrPd).map((d,i)=>({time:d.time,value:d.close+atrs[i].val})));const dnB=c.addLineSeries({color:'#f59e0b',lineWidth:1,lineStyle:2,title:'ATR-',lastValueVisible:true,priceLineVisible:false});dnB.setData(cd.slice(atrPd).map((d,i)=>({time:d.time,value:d.close-atrs[i].val})))}}catch(e){}try{const tr=tradesRef.current||[];const lastS=tr.find(t=>t.side==='SELL');const lastC=tr.find(t=>t.side==='COVER');if(lastS){const st=Math.floor(new Date(lastS.ts).getTime()/1000);const nearS=cd.reduce((a,b)=>Math.abs(a.time-st)<Math.abs(b.time-st)?a:b);if(nearS){const eL=c.addLineSeries({color:'#3b82f6',lineWidth:1,lineStyle:3,title:'Last Entry',lastValueVisible:true,priceLineVisible:false});eL.setData([{time:cd[0].time,value:nearS.close},{time:cd[cd.length-1].time,value:nearS.close}])}}if(lastC){const ct=Math.floor(new Date(lastC.ts).getTime()/1000);const nearC=cd.reduce((a,b)=>Math.abs(a.time-ct)<Math.abs(b.time-ct)?a:b);if(nearC){const xL=c.addLineSeries({color:'#67c839',lineWidth:1,lineStyle:3,title:'Last Exit',lastValueVisible:true,priceLineVisible:false});xL.setData([{time:cd[0].time,value:nearC.close},{time:cd[cd.length-1].time,value:nearC.close}])}}}catch(e2){}try{const sw=3;const lvs=[];for(let i=sw;i<cd.length-sw;i++){let hi=true,lo=true;for(let j=-sw;j<=sw;j++){if(j===0)continue;if(cd[i].high<=cd[i+j].high)hi=false;if(cd[i].low>=cd[i+j].low)lo=false}if(hi)lvs.push({p:cd[i].high,t:'R',c:1});if(lo)lvs.push({p:cd[i].low,t:'S',c:1})}const grp=[];const thr=0.005;lvs.forEach(l=>{const e=grp.find(g=>Math.abs(g.p-l.p)/g.p<thr);if(e){e.c++;e.p=l.t==='R'?Math.max(e.p,l.p):Math.min(e.p,l.p)}else grp.push({...l})});grp.sort((a,b)=>b.c-a.c);grp.slice(0,8).forEach(l=>{if(l.c<2)return;const ln=c.addLineSeries({color:l.t==='R'?'#f59e0b':'#06b6d4',lineWidth:1,lineStyle:2,lastValueVisible:true,priceLineVisible:false,title:l.t+' $'+money(l.p)+' ('+l.c+')'});ln.setData([{time:cd[0].time,value:l.p},{time:cd[cd.length-1].time,value:l.p}])})}catch(e3){}(posRef.current||[]).forEach(pos=>{if(!pos||!pos.symbol)return;const sym=pos.symbol.replace(/\/USD(T)?/g,'').replace(/-USD(T)?/g,'').trim();if(sym!==sel)return;if(pos.entry_price)cs.createPriceLine({price:parseFloat(pos.entry_price),color:'#3b82f6',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'Entry $'+money(parseFloat(pos.entry_price))});if(pos.sl)cs.createPriceLine({price:parseFloat(pos.sl),color:'#ef4444',lineWidth:1,axisLabelVisible:true,title:'SL $'+money(parseFloat(pos.sl))});if(pos.tp)cs.createPriceLine({price:parseFloat(pos.tp),color:'#67c839',lineWidth:1,axisLabelVisible:true,title:'TP $'+money(parseFloat(pos.tp))})});const mks=(tradesRef.current||[]).filter(x=>x.ts&&x.side).slice(0,15).map(x=>({time:Math.floor(new Date(x.ts).getTime()/1000),position:x.side==='BUY'?'belowBar':'aboveBar',color:x.side==='BUY'?'#67c839':'#ef4444',shape:x.side==='BUY'?'arrowUp':'arrowDown',text:(x.side==='COVER'?'CLOSE $'+money(x.pnl_usd||0):'OPEN $'+money(x.usd_amount||0))}));if(mks.length)cs.setMarkers(mks);ro.observe(el);setL(false)}catch(err){if(!dead){setE('Error: '+err.message);setL(false)}}})();return()=>{dead=true;ro.disconnect();if(chart.current)chart.current.remove()}},[sel,tf,cid]);return<><div id={cid} ref={ref} style={{width:'100%',height:400,display:l?'none':'block'}}></div>{l&&<div className="loader">Cargando gráfico…</div>}{e&&<div className="empty" style={{padding:20}}>{e}</div>}</>}

a[m]||0)>0?'var(--green)':Number(a[m]||0)<0?'var(--red)':'var(--text)'}}>{money(a[m]||0)+'\u20ac'}</td>)}<td style={{textAlign:'right',padding:'7px 8px',color:Number(a.interes||0)>0?'var(--green)':'var(--muted)'}}>{a.interes?a.interes+'%':''}</td><td style={{padding:'7px 8px',color:'var(--muted)'}}>{a.tipo||''}</td></tr>)}</tbody><tfoot><tr style={{borderTop:'2px solid #6d5dfc',fontWeight:700}}><td style={{padding:'7px 8px',color:'#6d5dfc'}}>TOTAL</td>{months.map(m=><td key={m} style={{textAlign:'right',padding:'7px 8px',fontFamily:'ui-monospace,SFMono-Regular,Menlo,monospace',color:'var(--green)'}}>{money(m==='febrero'?totFeb:totAbr)+'\u20ac'}</td>)}<td></td><td></td></tr></tfoot></table></Card>

function App(){const [bots,setBots]=useState([]),[page,setPage]=useState('home'); useEffect(()=>{API.bots().then(r=>setBots(r.bots||[]))},[]); const current=bots.find(b=>b.name===page); return <div className="app"><aside className="side"><div className="side-btns"><button className={page==='home'?'active':''} onClick={()=>setPage('home')}>⌂</button><button className={page==='portfolios'?'active':''} onClick={()=>setPage('portfolios')}>$</button>{page!=='portfolios'?bots.map(b=><button key={b.name} className={page===b.name?'active':''} onClick={()=>setPage(b.name)}>{botIcon(b.name)}</button>):null}</div><div className="side-version">v{APP_VERSION}</div></aside><main className="main"><header className="top"><div><div className="brand">Dashboard</div><div className="date">Viernes, 8 de Mayo 2026 · {new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div></div><nav className="tabs"><button className={`tab ${page==='home'?'active':''}`} onClick={()=>setPage('home')}>Home</button>{page!=='portfolios'?bots.map(b=><button key={b.name} className={`tab ${page===b.name?'active':''}`} onClick={()=>setPage(b.name)}>{b.label}</button>):<button className="tab active">Portfolios</button>}</nav></header>{page==='home'?<Home bots={bots} setPage={setPage}/>:page==='portfolios'?<PortfoliosPage />:<BotPage name={page}/>}</main></div>}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
